<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EasyDL — Settings</title>
  <link rel="stylesheet" href="/css/style.css">
  <script defer src="/js/api.js"></script>
  <script defer src="/js/settings.js"></script>
</head>
<body>
  <nav>
    <a class="nav-logo" href="/library" aria-label="EasyDL library">
      <span class="nav-logo-icon">↓</span>
      <span>EasyDL</span>
    </a>
    <div class="nav-links" aria-label="Primary navigation">
      <a class="nav-link" href="/library">Library</a>
      <a class="nav-link" href="/browse">Browse</a>
      <a class="nav-link" href="/settings">Settings</a>
    </div>
    <div class="nav-spacer"></div>
    <div id="nav-speed" class="nav-speed" aria-live="polite"></div>
    <div class="aria2-pill"><span id="nav-dot" class="status-dot"></span><span id="nav-label">checking</span></div>
  </nav>

  <main class="page settings-page">
    <header class="page-header">
      <div>
        <h1>Settings</h1>
        <p class="page-subtitle">All persisted EasyDL settings are shown here.</p>
      </div>
    </header>

    <form id="settings-form">
      <section class="settings-block">
        <h2 class="settings-block-title">Downloads</h2>
        <label class="settings-row">
          <span class="settings-label"><strong>Download path</strong><span>Base folder. Games save inside a folder named after the game.</span></span>
          <span class="settings-control"><input id="download_path" name="download_path" type="text" placeholder="downloads"></span>
        </label>
        <label class="settings-row">
          <span class="settings-label"><strong>Max concurrent files</strong><span>How many files aria2c can download at once.</span></span>
          <span class="settings-control narrow"><input id="max_concurrent" name="max_concurrent" type="number" min="1" max="32" step="1"></span>
        </label>
        <label class="settings-row">
          <span class="settings-label"><strong>Connections per file</strong><span>aria2c split connections for each download.</span></span>
          <span class="settings-control narrow"><input id="connections_per_file" name="connections_per_file" type="number" min="1" max="32" step="1"></span>
        </label>
      </section>

      <section class="settings-block">
        <h2 class="settings-block-title">Runtime</h2>
        <div id="runtime-box" class="info-box">Loading status…</div>
      </section>

      <button class="btn btn-primary" type="submit">Save Settings</button>
    </form>
  </main>
</body>
</html>
