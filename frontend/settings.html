<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EasyDL - Settings</title>
  <link rel="stylesheet" href="/css/style.css">
  <script defer src="/js/api.js"></script>
  <script defer src="/js/settings.js"></script>
</head>
<body>
  <nav class="side-nav">
    <a class="nav-logo" href="/library" aria-label="EasyDL library">
      <span class="nav-logo-icon">ED</span>
      <span>EasyDL</span>
    </a>
    <div class="nav-links" aria-label="Primary navigation">
      <a class="nav-link" href="/library">Library</a>
      <a class="nav-link" href="/browse">Browse</a>
      <a class="nav-link" href="/settings">Settings</a>
    </div>
    <div class="nav-spacer"></div>
    <div class="nav-status">
      <div id="nav-speed" class="nav-speed" aria-live="polite"></div>
      <div class="aria2-pill"><span id="nav-dot" class="status-dot"></span><span id="nav-label">checking</span></div>
    </div>
  </nav>

  <main class="page settings-page">
    <header class="page-header">
      <div>
        <p class="eyebrow">EasyDL</p>
        <h1>Settings</h1>
      </div>
    </header>

    <form id="settings-form" class="settings-shell">
      <aside class="settings-tabs" aria-label="Settings sections">
        <button type="button" data-settings-tab="downloads">Downloads</button>
        <button type="button" data-settings-tab="browse">Browse</button>
        <button type="button" data-settings-tab="library">Library</button>
        <button type="button" data-settings-tab="appearance">Appearance</button>
        <button type="button" data-settings-tab="runtime">Runtime</button>
      </aside>

      <div class="settings-panels">
        <section class="settings-panel" data-settings-panel="downloads">
          <h2>Downloads</h2>
          <label class="settings-row">
            <span class="settings-label"><strong>Download path</strong><span>Base folder</span></span>
            <span class="settings-control"><input id="download_path" name="download_path" type="text" placeholder="downloads"></span>
          </label>
          <label class="settings-row">
            <span class="settings-label"><strong>Max concurrent files</strong><span>aria2c queue width</span></span>
            <span class="settings-control narrow"><input id="max_concurrent" name="max_concurrent" type="number" min="1" max="32" step="1"></span>
          </label>
          <label class="settings-row">
            <span class="settings-label"><strong>Connections per file</strong><span>aria2c splits</span></span>
            <span class="settings-control narrow"><input id="connections_per_file" name="connections_per_file" type="number" min="1" max="32" step="1"></span>
          </label>
          <label class="settings-row">
            <span class="settings-label"><strong>Auto-start new games</strong><span>After adding from Browse</span></span>
            <span class="settings-control switch-control"><input id="auto_start_new_games" name="auto_start_new_games" type="checkbox"></span>
          </label>
        </section>

        <section class="settings-panel" data-settings-panel="browse" hidden>
          <h2>Browse</h2>
          <label class="settings-row">
            <span class="settings-label"><strong>Items per page</strong><span>Popular and search</span></span>
            <span class="settings-control narrow"><input id="browse_items_per_page" name="browse_items_per_page" type="number" min="6" max="60" step="1"></span>
          </label>
          <label class="settings-row">
            <span class="settings-label"><strong>Card size</strong><span>Browse grid</span></span>
            <span class="settings-control select-control">
              <select id="browse_card_size" name="browse_card_size">
                <option value="compact">Compact</option>
                <option value="medium">Medium</option>
                <option value="large">Large</option>
              </select>
            </span>
          </label>
          <label class="settings-row">
            <span class="settings-label"><strong>Descriptions</strong><span>Card text</span></span>
            <span class="settings-control switch-control"><input id="browse_show_descriptions" name="browse_show_descriptions" type="checkbox"></span>
          </label>
          <label class="settings-row">
            <span class="settings-label"><strong>Open links in new tab</strong><span>FitGirl pages</span></span>
            <span class="settings-control switch-control"><input id="browse_open_links_new_tab" name="browse_open_links_new_tab" type="checkbox"></span>
          </label>
        </section>

        <section class="settings-panel" data-settings-panel="library" hidden>
          <h2>Library</h2>
          <label class="settings-row">
            <span class="settings-label"><strong>Card size</strong><span>Library grid</span></span>
            <span class="settings-control select-control">
              <select id="library_card_size" name="library_card_size">
                <option value="compact">Compact</option>
                <option value="medium">Medium</option>
                <option value="large">Large</option>
              </select>
            </span>
          </label>
          <label class="settings-row">
            <span class="settings-label"><strong>Open first game</strong><span>Library launch</span></span>
            <span class="settings-control switch-control"><input id="library_default_detail" name="library_default_detail" type="checkbox"></span>
          </label>
          <label class="settings-row">
            <span class="settings-label"><strong>Show file URLs</strong><span>Detail links</span></span>
            <span class="settings-control switch-control"><input id="library_show_file_urls" name="library_show_file_urls" type="checkbox"></span>
          </label>
          <label class="settings-row">
            <span class="settings-label"><strong>Confirm deletes</strong><span>Games and links</span></span>
            <span class="settings-control switch-control"><input id="confirm_delete" name="confirm_delete" type="checkbox"></span>
          </label>
        </section>

        <section class="settings-panel" data-settings-panel="appearance" hidden>
          <h2>Appearance</h2>
          <label class="settings-row">
            <span class="settings-label"><strong>Interface scale</strong><span id="scale-value">100%</span></span>
            <span class="settings-control"><input id="interface_scale" name="interface_scale" type="range" min="85" max="125" step="5"></span>
          </label>
          <label class="settings-row">
            <span class="settings-label"><strong>Density</strong><span>Spacing</span></span>
            <span class="settings-control select-control">
              <select id="theme_density" name="theme_density">
                <option value="compact">Compact</option>
                <option value="comfortable">Comfortable</option>
                <option value="spacious">Spacious</option>
              </select>
            </span>
          </label>
          <label class="settings-row">
            <span class="settings-label"><strong>Reduce motion</strong><span>Transitions</span></span>
            <span class="settings-control switch-control"><input id="reduce_motion" name="reduce_motion" type="checkbox"></span>
          </label>
        </section>

        <section class="settings-panel" data-settings-panel="runtime" hidden>
          <h2>Runtime</h2>
          <div id="runtime-box" class="info-box">Loading status...</div>
        </section>

        <div class="settings-actions">
          <button class="btn btn-primary" type="submit">Save Settings</button>
        </div>
      </div>
    </form>
  </main>
</body>
</html>
