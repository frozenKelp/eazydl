<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EasyDL - Settings</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/style.css">
  <script defer src="/js/components/app-shell.js"></script>
  <script defer src="/js/api.js"></script>
  <script defer src="/js/settings.js"></script>
</head>
<body data-page="settings">
  <easy-shell page="settings" label="Settings" meta="preferences and runtime">
    <main class="page settings-page">
      <div class="workspace-grid single">
        <form id="settings-form" class="settings-shell">
          <aside class="settings-tabs" aria-label="Settings sections">
            <button type="button" data-settings-tab="downloads">Downloads</button>
            <button type="button" data-settings-tab="browse">Browse</button>
            <button type="button" data-settings-tab="library">Library</button>
            <button type="button" data-settings-tab="appearance">Appearance</button>
            <button type="button" data-settings-tab="runtime">Runtime</button>
          </aside>

          <div class="settings-panels">
            <section class="settings-panel" data-settings-panel="downloads">
              <h2>Downloads</h2>
              <div class="settings-row">
                <label class="settings-label" for="download_path"><strong>Download path</strong><span>Base folder</span></label>
                <span class="settings-control"><input id="download_path" name="download_path" type="text" placeholder="downloads"></span>
              </div>
              <div class="settings-row">
                <label class="settings-label" for="max_concurrent"><strong>Max concurrent files</strong><span>aria2c queue width</span></label>
                <span class="settings-control narrow"><input id="max_concurrent" name="max_concurrent" type="number" min="1" max="32" step="1"></span>
              </div>
              <div class="settings-row">
                <label class="settings-label" for="connections_per_file"><strong>Connections per file</strong><span>aria2c splits</span></label>
                <span class="settings-control narrow"><input id="connections_per_file" name="connections_per_file" type="number" min="1" max="16" step="1"></span>
              </div>
              <div class="settings-row">
                <label class="settings-label" for="auto_start_new_games"><strong>Auto-start new games</strong><span>After adding from Browse</span></label>
                <span class="settings-control switch-control"><input id="auto_start_new_games" name="auto_start_new_games" type="checkbox"></span>
              </div>
            </section>

            <section class="settings-panel" data-settings-panel="browse" hidden>
              <h2>Browse</h2>
              <div class="settings-row">
                <label class="settings-label" for="browse_items_per_page"><strong>Items per page</strong><span>Popular and search</span></label>
                <span class="settings-control narrow"><input id="browse_items_per_page" name="browse_items_per_page" type="number" min="6" max="60" step="1"></span>
              </div>
              <div class="settings-row">
                <label class="settings-label" for="browse_card_size"><strong>Card size</strong><span>Browse grid</span></label>
                <span class="settings-control select-control">
                  <select id="browse_card_size" name="browse_card_size">
                    <option value="compact">Compact</option>
                    <option value="medium">Medium</option>
                    <option value="large">Large</option>
                  </select>
                </span>
              </div>
            </section>

            <section class="settings-panel" data-settings-panel="library" hidden>
              <h2>Library</h2>
              <div class="settings-row">
                <label class="settings-label" for="library_card_size"><strong>Card size</strong><span>Library grid</span></label>
                <span class="settings-control select-control">
                  <select id="library_card_size" name="library_card_size">
                    <option value="compact">Compact</option>
                    <option value="medium">Medium</option>
                    <option value="large">Large</option>
                  </select>
                </span>
              </div>
              <div class="settings-row">
                <label class="settings-label" for="library_default_detail"><strong>Open first game</strong><span>Library launch</span></label>
                <span class="settings-control switch-control"><input id="library_default_detail" name="library_default_detail" type="checkbox"></span>
              </div>
              <div class="settings-row">
                <label class="settings-label" for="library_show_file_urls"><strong>Show file URLs</strong><span>Detail links</span></label>
                <span class="settings-control switch-control"><input id="library_show_file_urls" name="library_show_file_urls" type="checkbox"></span>
              </div>
              <div class="settings-row">
                <label class="settings-label" for="confirm_delete"><strong>Confirm deletes</strong><span>Games and links</span></label>
                <span class="settings-control switch-control"><input id="confirm_delete" name="confirm_delete" type="checkbox"></span>
              </div>
            </section>

            <section class="settings-panel" data-settings-panel="appearance" hidden>
              <h2>Appearance</h2>
              <div class="settings-row">
                <label class="settings-label" for="interface_scale"><strong>Interface scale</strong><span id="scale-value">100%</span></label>
                <span class="settings-control"><input id="interface_scale" name="interface_scale" type="range" min="85" max="125" step="5"></span>
              </div>
              <div class="settings-row">
                <label class="settings-label" for="theme_density"><strong>Density</strong><span>Spacing</span></label>
                <span class="settings-control select-control">
                  <select id="theme_density" name="theme_density">
                    <option value="compact">Compact</option>
                    <option value="comfortable">Comfortable</option>
                    <option value="spacious">Spacious</option>
                  </select>
                </span>
              </div>
              <div class="settings-row">
                <label class="settings-label" for="reduce_motion"><strong>Reduce motion</strong><span>Transitions</span></label>
                <span class="settings-control switch-control"><input id="reduce_motion" name="reduce_motion" type="checkbox"></span>
              </div>
            </section>

            <section class="settings-panel" data-settings-panel="runtime" hidden>
              <h2>Runtime</h2>
              <div id="runtime-box" class="info-box">Loading status...</div>
            </section>

            <div class="settings-actions">
              <button class="btn btn-primary" type="submit">Save Settings</button>
            </div>
          </div>
        </form>
      </div>
    </main>
  </easy-shell>
</body>
</html>
