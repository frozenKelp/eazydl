<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EasyDL - Library</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/style.css">
  <script defer src="/js/api.js"></script>
  <script defer src="/js/library.js"></script>
</head>
<body>
  <nav class="side-nav">
    <a class="nav-logo" href="/library" aria-label="EasyDL library">
      <span class="nav-logo-icon">ED</span>
      <span>EasyDL</span>
    </a>
    <div class="nav-links" aria-label="Primary navigation">
      <a class="nav-link" href="/library">Library</a>
      <a class="nav-link" href="/browse">Browse</a>
      <a class="nav-link" href="/settings">Settings</a>
    </div>
    <div class="nav-spacer"></div>
    <div class="nav-status">
      <div id="nav-speed" class="nav-speed" aria-live="polite"></div>
      <div class="aria2-pill"><span id="nav-dot" class="status-dot"></span><span id="nav-label">checking</span></div>
    </div>
  </nav>

  <main class="page library-page">
    <header class="page-header">
      <div>
        <p class="eyebrow">Downloads</p>
        <h1>Library</h1>
      </div>
      <button id="refresh-btn" class="btn btn-ghost" type="button">Refresh</button>
    </header>

    <section id="library-stats" class="stats-strip" aria-live="off"></section>
    <section id="library" aria-live="off">
      <div class="loading"><span class="spinner"></span> Loading library...</div>
    </section>
  </main>
</body>
</html>
