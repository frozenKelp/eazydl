<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>EasyDL - Library</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/css/style.css">
  <script defer src="/js/components/app-shell.js"></script>
  <script defer src="/js/api.js"></script>
  <script defer src="/js/library.js"></script>
</head>
<body data-page="library">
  <easy-shell page="library" label="Library" meta="local collection">
    <template data-shell-actions>
      <button id="refresh-btn" class="btn btn-ghost" type="button">
        <span>Refresh</span>
      </button>
      <input id="library-filter" type="search" placeholder="Filter library" autocomplete="off" aria-label="Filter library">
    </template>

    <main class="page library-page">
      <div class="workspace-grid">
        <section class="main-pane">
          <div class="pane-header">
            <div class="pane-title"><span class="icon icon-library" aria-hidden="true"></span><span>Library</span></div>
            <div class="pane-meta">local collection</div>
          </div>
          <div class="pane-body">
            <section id="library-stats" class="stats-strip" aria-live="off"></section>
            <section id="library" aria-live="off">
              <div class="loading"><span class="spinner"></span> Loading library...</div>
            </section>
          </div>
        </section>

        <aside class="utility-pane">
          <div class="pane-header">
            <div class="pane-title"><span class="icon icon-terminal" aria-hidden="true"></span><span>Queue</span></div>
            <div class="pane-meta">live</div>
          </div>
          <div class="pane-body utility-stack">
            <section class="mini-section" id="library-runtime-panel">
              <div class="mini-title">Session</div>
              <div class="mini-list">
                <div class="mini-row"><span>Backend</span><strong>Fastify</strong></div>
                <div class="mini-row"><span>Downloader</span><strong id="library-runtime-aria">checking</strong></div>
                <div class="mini-row"><span>Speed</span><strong id="library-runtime-speed">0 B/s</strong></div>
              </div>
            </section>
            <section class="mini-section" id="library-selection-panel">
              <div class="mini-title">Selection</div>
              <div class="mini-list">
                <div class="mini-row"><span>Visible games</span><strong id="library-visible-count">0</strong></div>
                <div class="mini-row"><span>Selected</span><strong id="library-selected-name">none</strong></div>
                <div class="mini-row"><span>Filter</span><strong id="library-filter-state">off</strong></div>
              </div>
            </section>
          </div>
        </aside>
      </div>
    </main>
  </easy-shell>
</body>
</html>
